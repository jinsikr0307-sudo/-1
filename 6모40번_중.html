<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>변형문제 — 학생용</title>
<style>
  :root{ --ink:#1a1a1a; --line:#cfcfcf; --soft:#f6f6f4; --accent:#7a1f2b; --teach:#0b6b53;
         --ok:#1c7c4a; --no:#b3261e; --rev:#a86b00; }
  *{ box-sizing:border-box; }
  body{ font-family:'Noto Serif KR',Georgia,'Times New Roman',serif; color:var(--ink);
        max-width:820px; margin:0 auto; padding:28px 22px 100px; line-height:1.6; background:#fff; }
  header.sheet{ border-bottom:2.5px solid var(--ink); padding-bottom:12px; margin-bottom:18px; }
  .sheet h1{ font-size:1.35rem; margin:0 0 4px; }
  .meta{ font-size:.82rem; color:#555; } .meta b{ color:var(--accent); }
  .controls{ position:sticky; top:0; background:#fff; padding:10px 0; border-bottom:1px solid var(--line);
             margin-bottom:18px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; z-index:5; }
  button{ font:inherit; font-size:.85rem; padding:6px 14px; border-radius:20px; cursor:pointer; }
  button.grade{ border:1.5px solid var(--accent); color:#fff; background:var(--accent); }
  button.reset{ border:1.5px solid #aaa; color:#555; background:#fff; }
  button.toggle{ border:1.5px solid var(--teach); color:var(--teach); background:#fff; }
  button.toggle.on{ background:var(--teach); color:#fff; }
  #score{ display:none; font-size:.92rem; font-weight:600; margin-left:auto; }
  #score b{ color:var(--accent); }
  .passage{ background:var(--soft); border:1px solid var(--line); border-radius:8px;
            padding:14px 16px; font-size:.92rem; margin-bottom:26px; }
  .passage .ttl{ font-weight:700; font-size:.8rem; letter-spacing:.04em; color:#777; text-transform:uppercase; margin-bottom:6px; }
  .q{ margin:0 0 30px; padding-bottom:22px; border-bottom:1px dashed var(--line); }
  .q .head{ display:flex; gap:8px; align-items:baseline; margin-bottom:8px; }
  .q .no{ font-weight:700; font-size:1.02rem; } .q .prompt{ font-weight:600; }
  .q .pts{ margin-left:auto; font-size:.78rem; color:#888; white-space:nowrap; }
  .badge{ font-size:.68rem; padding:1px 7px; border-radius:10px; background:#fdeaec; color:var(--accent); border:1px solid #f0c9ce; }
  .stim{ background:#fafafa; border-left:3px solid var(--line); padding:9px 13px; margin:8px 0 12px; font-size:.9rem; white-space:pre-line; }
  .stim u{ text-decoration:underline; text-underline-offset:2px; }
  .stim .mk{ font-size:.78em; vertical-align:.3em; color:var(--accent); margin-right:1px; }
  .stim .boxsel{ border:1px solid #999; border-radius:4px; padding:0 4px; background:#fff; }
  .stim .blank{ display:inline-block; min-width:90px; border-bottom:1.5px solid var(--ink); }
  ol.choices{ list-style:none; padding:0; margin:6px 0 0; }
  ol.choices li{ padding:5px 10px; border:1px solid transparent; border-radius:6px; cursor:pointer; font-size:.92rem; }
  ol.choices li:hover{ background:var(--soft); }
  ol.choices li.sel{ border-color:var(--accent); background:#fdeaec; }
  ol.choices li.correct{ border-color:var(--ok); background:#e8f6ee; }
  ol.choices li.wrong{ border-color:var(--no); background:#fdeaea; }
  .wb{ display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; }
  .wb span{ border:1px solid #bbb; border-radius:14px; padding:3px 11px; font-size:.85rem; background:#fff; }
  textarea, input.ans{ width:100%; font:inherit; font-size:.9rem; border:1px solid var(--line); border-radius:6px; padding:8px; }
  textarea{ min-height:48px; } input.ans{ max-width:240px; }
  .cond{ font-size:.8rem; color:#666; margin-top:6px; }
  .xw{ display:grid; gap:2px; margin:10px 0; }
  .xw .cell{ width:30px; height:30px; position:relative; }
  .xw .cell.blk{ background:transparent; }
  .xw .cell.on{ background:#fff; border:1.4px solid var(--ink); }
  .xw .cell.star{ box-shadow:inset 0 0 0 2px var(--accent); }
  .xw .cell .n{ position:absolute; top:0; left:1px; font-size:.5rem; color:#555; }
  .xw .cell .ch{ display:flex; align-items:center; justify-content:center; height:100%; font-size:.95rem; font-weight:600; visibility:hidden; }
  .xw .cell .st{ position:absolute; bottom:-2px; right:0px; font-size:.62rem; color:var(--accent); }
  body.showteach .xw .cell .ch{ visibility:visible; }
  .clues{ font-size:.84rem; } .clues b{ color:var(--accent); } .clues div{ margin:2px 0; }
  .extract{ margin-top:10px; font-size:.88rem; display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  .result{ display:none; margin-top:8px; font-size:.84rem; border-radius:6px; padding:7px 11px; }
  .result.ok{ background:#e8f6ee; border:1px solid #bfe6cf; color:var(--ok); }
  .result.no{ background:#fdeaea; border:1px solid #f0c4c4; color:var(--no); }
  .result.rev{ background:#fff6e6; border:1px solid #f0dcb0; color:var(--rev); }
  .teach{ display:none; margin-top:10px; background:#f0faf6; border:1px solid #bfe6d7; border-radius:6px; padding:9px 12px; font-size:.84rem; }
  body.showteach .teach{ display:block; }
  .teach .lab{ font-weight:700; color:var(--teach); }
  .ana{ margin:4px 0 0 0; padding-left:16px; } .ana li{ font-size:.8rem; }
  .ana .err{ color:var(--accent); font-weight:600; } .ana .ok{ color:#3a7; }
</style>
</head>
<body>
<header class="sheet"><h1 id="title"></h1><div class="meta" id="meta"></div></header>
<div class="controls">
  <button class="grade" id="gbtn">채점하기</button>
  <button class="reset" id="rbtn">다시 풀기</button>
  <button class="toggle" id="tbtn">정답·해설 보기</button>
  <span id="score"></span>
</div>
<div class="passage"><div class="ttl">Passage</div><div id="ptext"></div></div>
<div id="questions"></div>

<script>
const RECORD = {"passage_id": "wirye-g1-2026-emotion01", "meta": {"reference": "위례고", "grade": "1", "variation": "중", "level": "표준", "scale": "선택형 5 + 서술형 1 (표준)", "engine": "공통 출제 엔진 v2(v1_4)"}, "passage": {"title": "Deciding with Emotion Before Reason", "text": "Every day we head out into the world and judge what is safe or unsafe, suitable or unsuitable. According to psychologist Joseph LeDoux, an unconscious \"danger detector\" decides whether something or someone is safe before we can even begin to judge it consciously. When an object, animal, or person is judged to be dangerous, a fear reaction known as \"fight or flight\" kicks in. At a conscious level we can sometimes fix an error in this \"danger detector\" once we notice it, but more often we simply start producing reasons for why it was right all along. We tend to believe our choices are rational, yet in truth most human decisions are made emotionally, after which we gather or invent facts to justify them. The moment something or someone \"feels\" dangerous, we have already swung into action inside before we have even begun to \"think.\" In short, we carry out an automatic assessment of danger before any conscious thought, making emotion-based decisions first and then producing reasons to back them up."}, "questions": [{"id": "q1", "type": "대의_주제", "tags": ["대의", "주제"], "points": 3.3, "prompt": "다음 글의 주제로 가장 적절한 것은?", "choices": ["① the biological origin of the fight-or-flight response", "② how emotion shapes our decisions before conscious reasoning", "③ practical techniques for making more rational everyday choices", "④ the dangers of trusting strangers too quickly", "⑤ the difference between conscious and unconscious memory"], "answer": "②", "rationale": "글은 '무의식적 위험 탐지기 → 감정적 결정 선행 → 사후 이성적 정당화'라는 의사결정 메커니즘을 설명. ①은 공포 반응의 기원(지엽), ③ 본문은 비이성성을 지적, ④⑤ 초점 이탈."}, {"id": "q2", "type": "정밀대조_일치", "tags": ["정밀대조", "일치"], "points": 3.4, "prompt": "다음 글의 내용과 일치하는 것은?", "choices": ["① 인간은 위험을 의식적으로 판단한 뒤에야 비로소 반응을 시작한다.", "② '투쟁-도피' 반응은 대상이 안전하다고 판단될 때 일어난다.", "③ 우리는 위험 탐지기의 오류를 결코 바로잡지 못한다.", "④ 대부분의 결정은 감정적으로 내려진 뒤, 이를 정당화할 근거가 수집된다.", "⑤ LeDoux는 인간의 결정이 본질적으로 이성적이라고 보았다."], "answer": "④", "rationale": "본문 'most decisions are made emotionally, after which we gather facts to justify them'과 일치. ① 무의식 판단이 먼저, ② 위험하다고 판단될 때 발생, ③ 의식 수준에서 교정 가능, ⑤ 본문 취지와 반대."}, {"id": "q3", "type": "정밀대조_답할수있는질문", "tags": ["정밀대조", "답할수있는질문"], "points": 3.4, "prompt": "다음 글을 읽고 답할 수 있는 질문은?", "choices": ["① When did Joseph LeDoux first propose the danger detector?", "② How many decisions does a person make each day?", "③ Which part of the brain controls the fight-or-flight response?", "④ How long does an automatic danger assessment take?", "⑤ What happens after the danger detector judges something as dangerous?"], "answer": "⑤", "rationale": "⑤는 본문에 명시(공포 반응, 즉 'fight or flight'가 일어남)되어 답 가능. ①②③④(제안 시점·하루 결정 수·관여 뇌 부위·소요 시간)는 언급이 없어 답할 수 없음."}, {"id": "q4", "type": "어법_네모ABC", "tags": ["어법", "태", "관계사", "동사vs준동사"], "points": 3.5, "prompt": "(A), (B), (C)의 각 네모 안에서 어법상 알맞은 것끼리 짝지은 것은?", "stimulus": "We are convinced that our choices are rational, but in reality most decisions (A)[ are made / make ] emotionally, and we then gather reasons (B)[ why / which ] they feel right. The moment something feels dangerous, we (C)[ have / having ] already swung into action before we even begin to think.", "choices": ["① are made - why - have", "② make - why - have", "③ are made - which - have", "④ are made - why - having", "⑤ make - which - having"], "answer": "①", "rationale": "(A) 결정은 '내려지는' 대상 → 수동 are made. (B) 선행사 reasons + 완전한 절 → 관계부사 why. (C) 주절의 정동사(현재완료) → have(분사 having이 오면 정동사 없음).", "analysis": [{"marker": "(A)", "verdict": "are made", "point": "decisions are made(수동) — 결정은 내려지는 대상 (태)"}, {"marker": "(B)", "verdict": "why", "point": "reasons + 완전한 절 → 관계부사 why (관계사)"}, {"marker": "(C)", "verdict": "have", "point": "주절 정동사 have already swung (동사 vs 준동사)"}], "self_check": {"intended_count": 1, "verified_count": 1, "trap_types": ["태", "관계사", "동사vs준동사"]}}, {"id": "q5", "type": "어휘_부적절_1개고르기", "tags": ["어휘", "혼동어", "conscious/conscientious"], "points": 3.4, "prompt": "다음 글의 밑줄 친 부분 중 문맥상 낱말의 쓰임이 적절하지 않은 것은?", "stimulus": "LeDoux's unconscious \"danger detector\" [[① assesses]] whether someone is safe before we [[② consciously]] decide. On a [[③ conscientious]] level we may later correct its mistakes, yet we usually just invent reasons to [[④ justify]] the snap judgment we have already [[⑤ made]].", "choices": ["① assesses", "② consciously", "③ conscientious", "④ justify", "⑤ made"], "answer": "③", "rationale": "문맥은 '의식적인 차원에서(on a conscious level)'를 뜻하므로 conscious가 적절. conscientious(성실한/양심적인)는 형태가 비슷한 혼동어로 의미가 어긋남."}, {"id": "q6", "type": "서술형_조건영작", "tags": ["서술형", "조건영작", "검수요망"], "points": 5.0, "prompt": "다음 우리말과 같은 뜻이 되도록 <보기>의 단어를 모두 한 번씩 사용하여 배열하시오. (어형 변형 없이)", "korean_prompt": "우리의 결정은 대개 이성적으로보다는 감정적으로 내려진다.", "word_bank": ["than", "made", "decisions", "are", "rationally", "our", "emotionally", "usually", "rather"], "answer_arrangement": "our decisions are usually made emotionally rather than rationally", "accepted_answers": ["our decisions are usually made emotionally rather than rationally"], "answer": "our decisions are usually made emotionally rather than rationally", "rationale": "주어 our decisions + 수동 are (usually) made + 부사 emotionally + 비교구문 rather than rationally."}], "set_memo": {"대의": "주제 (set5 제목 → 전환)", "정밀대조": ["내용 일치(긍정형)", "답할 수 있는 질문"], "오류탐지": ["어법 네모 (A)(B)(C) — 태·관계사·동사vs준동사(정답 ①)", "어휘 혼동어 conscious/conscientious(정답 ③)"], "어법_served_type": "네모 (A)(B)(C) (set5 1개 고르기 → 전환). 함정 수일치 → 태·관계사·동사준동사로 교체.", "로테이션": "조건영작 (서술형 겸함; set5 요약문 → 전환)", "특수": "영영퍼즐 미사용 (set4 사용·set5/6 로테이션 아웃 — 다음 세트 재투입 후보)", "정답분산": "② ④ ⑤ ① ③ (선택형 5문항 분산)", "검수요망": ["q6 조건영작: <보기> 9개 전수 사용·빈칸당 1단어·유일 배열 여부 최종 확인(특히 rather than/emotionally·rationally 위치)"], "variation_note": "중: 동의어 치환·문장별 패러프레이즈, 순서·논리 보존. 원문 마지막 요약 문장은 In short~로 보존.", "level_note": "표준: 저배점(3.3~3.5), 함정 문항당 1종·약하게, 정답 또렷.", "cross_set_prev": ["set1 digitalmin / set2 iceage / set3 workingmem / set4 gesture / set5 deforest", "set5 deforest (제목/표정리·잘못이해/1개고르기·수일치/반의어/요약문빈칸영작)"]}};
const GRID   = null;
const responses = {};
const esc = s => (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const norm = s => (s==null?'':String(s)).toLowerCase().replace(/[.,!?;:'"()]/g,'').replace(/\s+/g,' ').trim();

function renderStim(s){
  if(!s) return '';
  let h = esc(s);
  h = h.replace(/\[\[(\S) (.*?)\]\]/g,(m,mk,w)=>`<span class="mk">${mk}</span><u>${w}</u>`);
  h = h.replace(/\[([^\[\]]*?\/[^\[\]]*?)\]/g,(m,inner)=>`<span class="boxsel">[${inner}]</span>`);
  h = h.replace(/_{3,}/g,'<span class="blank"></span>');
  return h;
}

document.getElementById('title').textContent = RECORD.passage.title;
const m = RECORD.meta;
document.getElementById('meta').innerHTML =
  `레퍼런스 <b>${m.reference}</b> · 고${m.grade} · variation ${m.variation} · level ${m.level} · ${RECORD.passage_id}`;
document.getElementById('ptext').textContent = RECORD.passage.text;
const box = document.getElementById('questions');

function choiceList(q){
  const ol=document.createElement('ol'); ol.className='choices';
  q.choices.forEach(c=>{
    const li=document.createElement('li'); li.textContent=c; li.dataset.sym=c.trim().charAt(0);
    li.onclick=()=>{ [...ol.children].forEach(x=>x.classList.remove('sel')); li.classList.add('sel');
      responses[q.id]=li.dataset.sym; };
    ol.appendChild(li);
  });
  return ol;
}

function crossword(q){
  const wrap=document.createElement('div');
  const g=document.createElement('div'); g.className='xw';
  g.style.gridTemplateColumns=`repeat(${GRID.cols},30px)`;
  const map={}; GRID.cells.forEach(c=>map[c.r+'_'+c.c]=c);
  for(let r=0;r<GRID.rows;r++){ for(let c=0;c<GRID.cols;c++){
    const cell=document.createElement('div'); cell.className='cell'; const d=map[r+'_'+c];
    if(d){ cell.classList.add('on'); if(d.mark) cell.classList.add('star');
      if(d.num) cell.innerHTML+=`<span class="n">${d.num}</span>`;
      cell.innerHTML+=`<span class="ch">${d.ch}</span>`;
      if(d.mark) cell.innerHTML+=`<span class="st">${d.mark}</span>`;
    } else cell.classList.add('blk');
    g.appendChild(cell);
  }}
  wrap.appendChild(g);
  const cl=document.createElement('div'); cl.className='clues';
  let html='<div><b>ACROSS →</b></div>';
  GRID.across.forEach(e=>html+=`<div>${e.num}. (${e.len}) ${esc(e.clue)}</div>`);
  html+='<div style="margin-top:6px"><b>DOWN ↓</b></div>';
  GRID.down.forEach(e=>html+=`<div>${e.num}. (${e.len}) ${esc(e.clue)}</div>`);
  cl.innerHTML=html; wrap.appendChild(cl);
  const ex=document.createElement('div'); ex.className='extract';
  const last=GRID.marks[GRID.marks.length-1].label;
  const lab=document.createElement('span'); lab.textContent=`Ⓐ~${last} 칸 철자를 순서대로 모은 단어:`;
  const inp=document.createElement('input'); inp.className='ans'; inp.placeholder='숨은 단어';
  inp.oninput=()=>responses[q.id]=inp.value;
  ex.appendChild(lab); ex.appendChild(inp); wrap.appendChild(ex);
  return wrap;
}

RECORD.questions.forEach((q,i)=>{
  const div=document.createElement('div'); div.className='q'; div.dataset.qi=i;
  const head=document.createElement('div'); head.className='head';
  const tags=(q.tags||[]).map(t=>`<span class="badge">${t}</span>`).join(' ');
  head.innerHTML=`<span class="no">${i+1}.</span><span class="prompt">${esc(q.prompt)} ${tags}</span><span class="pts">[${q.points}점]</span>`;
  div.appendChild(head);
  if(q.stimulus){ const st=document.createElement('div'); st.className='stim'; st.innerHTML=renderStim(q.stimulus); div.appendChild(st); }

  if(q.type==='영영풀이퍼즐'){ div.appendChild(crossword(q)); }
  else if(q.choices){ div.appendChild(choiceList(q)); }
  else if(q.type==='서술형_조건영작'){
    if(q.korean_prompt){ const k=document.createElement('div'); k.style.cssText='font-size:.88rem;margin:4px 0'; k.textContent='우리말: '+q.korean_prompt; div.appendChild(k); }
    if(q.word_bank){ const wb=document.createElement('div'); wb.className='wb'; q.word_bank.forEach(w=>{const s=document.createElement('span');s.textContent=w;wb.appendChild(s);}); div.appendChild(wb); }
    const ta=document.createElement('textarea'); ta.placeholder='여기에 영작'; ta.oninput=()=>responses[q.id]=ta.value; div.appendChild(ta);
    const cd=document.createElement('div'); cd.className='cond'; cd.textContent='<조건> 보기를 모두 한 번씩 사용, 어형 변형 없이 배열'; div.appendChild(cd);
  } else {
    const ta=document.createElement('textarea'); ta.placeholder='답안 작성'; ta.oninput=()=>responses[q.id]=ta.value; div.appendChild(ta);
  }

  const res=document.createElement('div'); res.className='result'; div.appendChild(res);

  const t=document.createElement('div'); t.className='teach';
  let th=`<span class="lab">정답:</span> ${esc(typeof q.answer==='object'?JSON.stringify(q.answer):(q.answer||q.answer_arrangement||''))}`;
  if(q.answer_arrangement) th+=`<br><span class="lab">배열:</span> ${esc(q.answer_arrangement)}`;
  if(q.rationale) th+=`<br><span class="lab">해설:</span> ${esc(q.rationale)}`;
  if(q.self_check) th+=`<br><span class="lab">self_check:</span> 의도 ${q.self_check.intended_count}/검증 ${q.self_check.verified_count} ${q.self_check.trap_types?'· '+q.self_check.trap_types.join(','):''}`;
  if(q.analysis){ th+='<ul class="ana">'; q.analysis.forEach(a=>{ th+=`<li><span class="${a.verdict==='오류'?'err':'ok'}">${a.marker} ${a.verdict}</span> — ${esc(a.point)}</li>`; }); th+='</ul>'; }
  if(q.puzzle_note) th+=`<br><span class="lab">숨은 단어:</span> ${esc(GRID.hidden)} (${GRID.marks.map(x=>x.label+'='+x.letter).join(' ')})<br><span class="lab">퍼즐:</span> ${esc(q.puzzle_note)}`;
  t.innerHTML=th; div.appendChild(t);
  box.appendChild(div);
});

// 채점
function correctSet(q){
  if(q.type==='영영풀이퍼즐') return (q.accepted_answers&&q.accepted_answers.hidden)||[q.answer];
  if(q.type==='서술형_조건영작') return q.accepted_answers||[q.answer_arrangement];
  return [q.answer];
}
function grade(){
  let earned=0,total=0,objTotal=0,objEarned=0,review=[];
  const cards=document.querySelectorAll('.q');
  RECORD.questions.forEach((q,i)=>{
    total+=q.points; const card=cards[i]; const res=card.querySelector('.result');
    const r=responses[q.id]; let ok=false,status,expected;
    if(q.choices){
      objTotal+=q.points; expected=q.answer; ok=(r||'')===q.answer; status=ok?'정답':'오답';
      const lis=card.querySelectorAll('ol.choices li');
      lis.forEach(li=>{ if(li.dataset.sym===q.answer) li.classList.add('correct');
        if(li.classList.contains('sel') && !ok) li.classList.add('wrong'); });
      if(ok) objEarned+=q.points;
    } else if(q.type==='영영풀이퍼즐'){
      const acc=correctSet(q); objTotal+=q.points; expected=acc.join(' / ');
      ok=acc.some(a=>norm(a)===norm(r)); status=ok?'정답':'오답'; if(ok) objEarned+=q.points;
    } else if(q.type==='서술형_조건영작'){
      const acc=correctSet(q); expected=acc.join(' / ');
      ok=acc.some(a=>norm(a)===norm(r)); status=ok?'정답(자동일치)':'검수 필요'; if(!ok) review.push(i+1);
    } else { status='검수 필요'; expected=q.answer||''; review.push(i+1); }
    if(ok) earned+=q.points;
    res.style.display='block';
    res.className='result '+(ok?'ok':(status==='검수 필요'?'rev':'no'));
    res.innerHTML=`<b>${ok?'✓ '+status:(status==='검수 필요'?'⚠ '+status:'✗ '+status)}</b> · 정답: ${esc(expected)}`
      +(q.rationale?`<br>해설: ${esc(q.rationale)}`:'');
  });
  const s=document.getElementById('score'); s.style.display='inline';
  s.innerHTML=`자동채점 <b>${objEarned.toFixed(1)} / ${objTotal.toFixed(1)}점</b>`
    +(review.length?` · 서술형 검수 필요: ${review.join(', ')}번`:'')
    +` · (전체 ${total.toFixed(1)}점)`;
}
function reset(){
  for(const k in responses) delete responses[k];
  document.querySelectorAll('ol.choices li').forEach(li=>li.classList.remove('sel','correct','wrong'));
  document.querySelectorAll('textarea, input.ans').forEach(e=>e.value='');
  document.querySelectorAll('.result').forEach(r=>{r.style.display='none';r.innerHTML='';});
  document.getElementById('score').style.display='none';
}
document.getElementById('gbtn').onclick=grade;
document.getElementById('rbtn').onclick=reset;
const btn=document.getElementById('tbtn');
btn.onclick=()=>{ document.body.classList.toggle('showteach'); btn.classList.toggle('on');
  btn.textContent=document.body.classList.contains('showteach')?'학생 보기로':'정답·해설 보기'; };
</script>
